name: flutter_inventory
description: StockFlow – Inventory management app with 2×N grid.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  file_picker: ^8.0.0
  provider: ^6.1.2
  uuid: ^4.5.3
  http: ^1.6.0
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1

dev_dependencies:
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
